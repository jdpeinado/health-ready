name = "health-ready-api"
main = "src/worker.ts"
compatibility_date = "2026-06-13"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGIN = "http://localhost:5173"

# Serve the built web app (apps/web/dist) from this same Worker so the SPA and
# API share one origin. run_worker_first routes every request through the Worker;
# `/api/*` hits the API, everything else is served from these assets (with an
# index.html fallback for client-side routes).
[assets]
directory = "../web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "health-ready"
database_id = "e7e03fa6-f8b4-4343-8716-c2053e31e8e0"
migrations_dir = "migrations"
